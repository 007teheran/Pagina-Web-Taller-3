<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeo Sensorial - Taller 3</title>

    <style>
        /* --- ESTILOS BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f4f4;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("parque2.jpg"); 
            background-size: cover;
            background-position: center;
            opacity: 0.7; 
            z-index: -1; 
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #03141F;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        nav h1 { color: #fff; font-size: 1.1rem; }
        nav ul { list-style: none; display: flex; gap: 16px; }
        nav ul li a { color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 6px; }
        nav ul li a:hover { background: #f39c12; color: #111; }

        /* --- SLIDER TIPO CORRIDO --- */
        .slider-container {
            position: relative;
            max-width: 1080px;
            margin: 120px auto 40px; 
            padding: 0 20px;
            z-index: 10;
        }

        .slider-wrapper {
            width: 100%;
            overflow: hidden; 
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            background: #fff;
        }

        .slider-track {
            display: flex; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .slider-track img {
            width: 100%;
            flex-shrink: 0; 
            display: block;
        }



        @media (min-width: 768px) {
            .slider-track{
                width: 50%;
            }
        }

        /* BOTONES */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 16px;
            cursor: pointer;
            font-size: 24px;
            border-radius: 50%;
            z-index: 50;
            transition: 0.3s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prev:hover, .next:hover { background: #f39c12; color: #111; }
        .prev { left: -10px; }
        .next { right: -10px; }

        footer {
            margin-top: 40px;
            text-align: center;
            color: #ffffff;
            font-size: 0.9rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>Taller 3 - Mapeo Sensorial</h1>
        <ul style="list-style: none;">
            <li><a href="index.html" style="color: white; text-decoration: none;">Volver al Inicio</a></li>
        </ul>
    </nav>

    <div class="slider-container">
        <button class="prev" id="prevBtn">&#10094;</button>
        <button class="next" id="nextBtn">&#10095;</button>
        
        <div class="slider-wrapper">
            <div class="slider-track" id="track">
                <img src="MP_1.png" alt="1">
                <img src="MP_2.png" alt="2">
                <img src="MP_3.png" alt="3">
                <img src="MP_4.png" alt="4">
                <img src="MP_5.png" alt="5">
                <img src="MP_6.png" alt="6">
                <img src="MP_7.png" alt="7">
                <img src="MP_8.png" alt="8">
                <img src="MP_9.png" alt="9">
                <img src="MP_10.png" alt="10">
            </div>
        </div>
    </div>

    <footer>
        <p>Proyecto Taller 3 - Patrimonio y Contexto | Santa Fe de Antioquia</p>
    </footer>

    <script>
        const track = document.getElementById('track');
        const images = document.querySelectorAll('.slider-track img');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        const firstClone = images[0].cloneNode(true);
        const lastClone = images[images.length - 1].cloneNode(true);

        track.appendChild(firstClone);
        track.insertBefore(lastClone, images[0]);

        let counter = 1; 
        const size = 100; 
        track.style.transform = `translateX(${-size * counter}%)`;

        function moveSlider(direction) {
            if (counter <= 0 || counter >= track.children.length - 1) return;
            
            track.style.transition = "transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
            counter += direction;
            track.style.transform = `translateX(${-size * counter}%)`;
        }

        nextBtn.addEventListener('click', () => moveSlider(1));
        prevBtn.addEventListener('click', () => moveSlider(-1));

        track.addEventListener('transitionend', () => {
            if (track.children[counter].alt === firstClone.alt && counter >= track.children.length - 1) {
                track.style.transition = "none";
                counter = 1;
                track.style.transform = `translateX(${-size * counter}%)`;
            }
            if (track.children[counter].alt === lastClone.alt && counter <= 0) {
                track.style.transition = "none";
                counter = track.children.length - 2;
                track.style.transform = `translateX(${-size * counter}%)`;
            }
        });

        setInterval(() => moveSlider(1), 20000);
    </script>

</body>
</html>
