<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeo Sensorial - Taller 3</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #111;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        nav h1 {
            color: #fff;
            font-size: 1.1rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 16px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.25s ease;
        }

        nav ul li a:hover {
            background: #f39c12;
            color: #111;
        }

        .content {
            padding: 100px 10% 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-section {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .image-section h2 {
            margin-bottom: 20px;
            font-size: 2.2rem;
            color: #111;
            border-left: 5px solid #f39c12;
            padding-left: 12px;
        }

        .image-two {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .image-item {
            width: 100%;
            max-width: 1080px;
            text-align: center;
        }

        .image-item img {
            width: 100%;
            max-width: 1080px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            transition: transform 0.35s ease, filter 0.35s ease;
        }

        .image-item img:hover {
            transform: scale(1.02);
            filter: brightness(1.04);
        }

        .image-item p {
            margin-top: 10px;
            font-size: 1rem;
            color: #555;
        }

        @media (max-width: 980px) {
            .image-item {
                flex: 1 1 100%;
            }

            .image-item img {
                max-height: 420px;
            }
        }

        @media (max-width: 600px) {
            .content {
                padding: 100px 5% 40px;
            }

            .image-item img {
                max-height: 300px;
            }

            nav ul {
                display: none;
            }
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>Taller 3 - Mapeo Sensorial</h1>
        <ul>
            <li><a href="index.HTML">Volver al Inicio</a></li>
        </ul>
    </nav>

    <main class="content">
        <section class="image-section" id="fotografias">

            <div class="image-two">
                <div class="image-item">
                    <img src="LíneaDelTiempo1.png" alt="Línea del Tiempo 1">
                    <img src="LineaDelTiempo2.png" alt="Línea del Tiempo 2">
                </div>
        </section>
    </main>

    <footer>
        <p>Proyecto Taller 3 - Patrimonio y Contexto | Santa Fe de Antioquia</p>
    </footer>

</body>
</html>
